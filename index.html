<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salary Increment Calculator 2026</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">

    <img src="pakistan-flag.png" class="flag-img">

    <h1>Government of Sindh</h1>

    <h2>Salary Calculator 2026-27 Budget</h2>

    <img src="buriro.jpg" class="profile-img">

    <h3>
        Presented to you by:
        <br>
        TEO Mr. Niaz Ahmed Khoso
        <br>
        Taluka Thul
    </h3>

</div>

<!-- INPUT PANEL -->
<section class="card">

<h2>Enter Details</h2>

<label>BPS Scale</label>
<select id="bpsScale" onchange="handleBpsChange()"></select>

<label>Stage</label>
<select id="bpsStage" onchange="handleStageChange()"></select>

<label>Basic Pay</label>
<input type="number" id="basicPay" oninput="handleBasicInput()">

<div id="matchFeedback"></div>

<div id="personalPayGroup" style="display:none;">
    <label>Personal Pay</label>
    <input type="number" id="personalPay" oninput="handlePPInput()">
</div>

</section>

<!-- RESULT PANEL -->
<section class="card">

<h2>Results</h2>

<table border="1">
<tr>
    <td>Basic (2022)</td>
    <td id="tblBasicCurrent">0</td>
</tr>

<tr>
    <td>Basic (2026)</td>
    <td id="tblBasicNewVal">0</td>
</tr>

<tr>
    <td>Adhoc 2024</td>
    <td id="tblAdhoc2024New">0</td>
</tr>

<tr>
    <td>Adhoc 2026</td>
    <td id="tblAdhoc2026New">0</td>
</tr>

<tr>
    <td>Total Increase</td>
    <td id="tblTotalIncrease">0</td>
</tr>

<tr>
    <td>GP Fund Diff</td>
    <td id="tblGpfDiff">0</td>
</tr>

<tr>
    <th>Net Increase</th>
    <th id="tblRealIncrease">0</th>
</tr>

</table>

<button onclick="calculateSalary()">Calculate</button>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
